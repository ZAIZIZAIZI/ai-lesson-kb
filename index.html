<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1d4ed8" />
<title>AI 主课知识宝典 · 每日复习</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--primary:#2563eb;--primary-soft:#dbeafe;--ok:#16a34a;--ok-soft:#dcfce7;--bad:#dc2626;--bad-soft:#fee2e2;--warn:#d97706;--warn-soft:#fef3c7;--shadow:0 8px 24px rgba(15,23,42,.08);--radius:16px;--nav-h:64px;--safe-b:env(safe-area-inset-bottom,0px);--font:16px}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:var(--font);line-height:1.55}
button,input,select{font:inherit}
body{max-width:480px;margin:0 auto;min-height:100vh;position:relative}
.app{min-height:100vh;padding-bottom:calc(var(--nav-h) + var(--safe-b) + 12px)}
.top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,#1d4ed8,#2563eb);color:#fff;padding:14px 16px 16px;box-shadow:0 6px 18px rgba(37,99,235,.25)}
.top h1{margin:0;font-size:18px;font-weight:700}
.top p{margin:4px 0 0;opacity:.9;font-size:12px}
.course-select{margin-top:10px;display:flex;gap:8px;align-items:center}
.course-select select{flex:1;border:none;border-radius:10px;padding:10px 12px;background:rgba(255,255,255,.95);color:#0f172a;min-height:42px}
.progress-row{display:flex;align-items:center;gap:12px;margin-top:12px}
.ring{width:54px;height:54px;border-radius:50%;background:conic-gradient(#fff var(--p,0%), rgba(255,255,255,.25) 0);display:grid;place-items:center;flex-shrink:0}
.ring-inner{width:42px;height:42px;border-radius:50%;background:#1d4ed8;display:grid;place-items:center;font-size:11px;font-weight:700}
.stats{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.stat{background:rgba(255,255,255,.15);border-radius:10px;padding:6px 4px;text-align:center}
.stat b{display:block;font-size:14px}
.stat span{font-size:10px;opacity:.9}
.page{display:none;padding:14px 14px 8px}
.page.active{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}
.card h2,.card h3{margin:0 0 8px;font-size:16px}
.muted{color:var(--muted);font-size:13px}
.row{display:flex;gap:8px;flex-wrap:wrap}
.btn{appearance:none;border:none;border-radius:12px;padding:12px 14px;background:var(--primary);color:#fff;font-weight:600;cursor:pointer;min-height:44px}
.btn:active{transform:scale(.98)}
.btn.ghost{background:#fff;color:var(--primary);border:1px solid #bfdbfe}
.btn.soft{background:var(--primary-soft);color:#1d4ed8}
.btn.block{width:100%}
.btn.bad{background:var(--bad)}
.btn:disabled{opacity:.5;cursor:not-allowed}
.chip{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:999px;background:#eef2ff;color:#3730a3;font-size:12px;font-weight:600}
.chip.orange{background:var(--warn-soft);color:#92400e}
.chip.green{background:var(--ok-soft);color:#166534}
.chip.gray{background:#f1f5f9;color:#475569}
.chip.blue{background:var(--primary-soft);color:#1d4ed8}
.mod{display:flex;gap:12px;align-items:flex-start;cursor:pointer}
.mod .dot{width:12px;height:12px;border-radius:50%;margin-top:5px;flex-shrink:0}
.mod .meta{flex:1}
.mod .title{font-weight:700;font-size:15px}
.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin-top:8px}
.bar>i{display:block;height:100%;background:var(--primary);width:0;border-radius:999px;transition:width .3s}
.list-item{padding:12px 0;border-bottom:1px solid var(--line)}
.list-item:last-child{border-bottom:none}
.quote{background:linear-gradient(135deg,#eff6ff,#f8fafc);border-left:4px solid var(--primary);padding:12px 14px;border-radius:0 12px 12px 0;font-weight:600;margin:10px 0}
.fold{border:1px dashed #cbd5e1;border-radius:12px;padding:10px 12px;margin-top:10px;background:#fafafa}
.fold summary{cursor:pointer;font-weight:600;color:#1e40af;list-style:none}
.fold summary::-webkit-details-marker{display:none}
.fold .body{margin-top:8px;font-size:13px;color:#334155}
.tag-row{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.option{display:block;width:100%;text-align:left;padding:14px;border-radius:14px;border:1.5px solid var(--line);background:#fff;margin-bottom:10px;cursor:pointer;min-height:48px}
.option.selected{border-color:var(--primary);background:var(--primary-soft)}
.option.correct{border-color:var(--ok);background:var(--ok-soft)}
.option.wrong{border-color:var(--bad);background:var(--bad-soft)}
.option:disabled{cursor:default}
.quiz-progress{font-size:13px;color:var(--muted);margin-bottom:8px}
.sheet-mask{position:fixed;inset:0;background:rgba(15,23,42,.45);z-index:40;display:none;align-items:flex-end;justify-content:center}
.sheet-mask.show{display:flex}
.sheet{width:100%;max-width:480px;max-height:78vh;overflow:auto;background:#fff;border-radius:20px 20px 0 0;padding:16px 16px calc(18px + var(--safe-b));box-shadow:0 -10px 30px rgba(0,0,0,.15)}
.sheet .handle{width:42px;height:4px;border-radius:4px;background:#cbd5e1;margin:0 auto 12px}
.nav{position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:480px;height:calc(var(--nav-h) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(255,255,255,.96);backdrop-filter:blur(10px);border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:30}
.nav button{border:none;background:transparent;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer}
.nav button.active{color:var(--primary);font-weight:700}
.nav .ico{font-size:18px;line-height:1}
.empty{text-align:center;color:var(--muted);padding:28px 12px}
.kicker{font-size:12px;color:var(--muted);margin-bottom:4px}
.anchor-box{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px 12px;margin-top:8px;font-size:13px}
.anchor-box b{color:#1d4ed8}
.seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.seg button{border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px 6px;min-height:44px;cursor:pointer;font-size:13px}
.seg button.active{background:var(--primary-soft);border-color:#93c5fd;color:#1d4ed8;font-weight:700}
.toast{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(var(--nav-h) + var(--safe-b) + 16px);background:#0f172a;color:#fff;padding:10px 14px;border-radius:999px;font-size:13px;z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.toast.show{opacity:1}
.hero-actions .btn{flex:1;min-width:120px}
.small{font-size:12px}
.goal{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--line)}
.goal:last-child{border-bottom:none}
.check{width:18px;height:18px;border-radius:50%;border:2px solid #94a3b8;flex-shrink:0}
.check.done{background:var(--ok);border-color:var(--ok);box-shadow:inset 0 0 0 3px #fff}
.hidden{display:none!important}
.back-btn{background:transparent;border:none;color:#1d4ed8;font-weight:700;padding:0 0 10px;cursor:pointer}
.result-big{font-size:28px;font-weight:800;text-align:center;margin:8px 0}
.day-card{cursor:pointer;border:1.5px solid var(--line);transition:border-color .15s}
.day-card.active-day{border-color:#93c5fd;background:linear-gradient(180deg,#eff6ff,#fff)}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <h1>AI 主课知识宝典</h1>
    <p id="topSub">每日课堂复习 · 学练回看</p>
    <div class="course-select">
      <select id="courseSelect" aria-label="选择课程日"></select>
    </div>
    <div class="progress-row">
      <div class="ring" id="homeRing" style="--p:0%"><div class="ring-inner" id="homeRingText">0%</div></div>
      <div class="stats">
        <div class="stat"><b id="statLearned">0/0</b><span>已学模块</span></div>
        <div class="stat"><b id="statAcc">-</b><span>正确率</span></div>
        <div class="stat"><b id="statWrong">0</b><span>错题</span></div>
      </div>
    </div>
  </header>

  <section class="page active" id="page-home">
    <div class="card">
      <div class="kicker">当前课程</div>
      <h3 id="homeCourseTitle">-</h3>
      <p class="muted" id="homeCourseSummary"></p>
      <div class="tag-row" id="homeGoals"></div>
    </div>
    <div class="card">
      <div class="kicker">今日任务（针对当前课程日）</div>
      <div class="goal"><div class="check" id="taskLearn"></div><div><b>学完 1 个模块</b><div class="muted small">系统复习一个知识点</div></div></div>
      <div class="goal"><div class="check" id="taskQuiz"></div><div><b>完成 8 道练习</b><div class="muted small" id="taskQuizText">已练 0 / 8</div></div></div>
      <div class="goal"><div class="check" id="taskReview"></div><div><b>回看错题一次</b><div class="muted small">答错后温习课堂片段</div></div></div>
    </div>
    <div class="card hero-actions">
      <div class="row">
        <button class="btn" id="btnContinueLearn">继续学习</button>
        <button class="btn soft" id="btnStartQuiz">开始测验</button>
      </div>
      <button class="btn ghost block" style="margin-top:8px" id="btnOpenWrong">查看错题本</button>
    </div>
    <div class="card">
      <h3>全部课程进度</h3>
      <div id="allDaysProgress"></div>
    </div>
    <div class="card">
      <h3>课堂金句</h3>
      <div class="quote" id="homeQuote">-</div>
      <button class="btn ghost block" id="btnNextQuote">换一句</button>
    </div>
    <div class="card">
      <h3>薄弱提醒</h3>
      <div id="weakBox" class="muted">先做几道题，我会帮你找出薄弱模块。</div>
    </div>
  </section>

  <section class="page" id="page-learn">
    <div id="learnList"></div>
    <div id="learnDetail" class="hidden"></div>
  </section>

  <section class="page" id="page-quiz">
    <div id="quizSetup">
      <div class="card">
        <h3>选择练习模式</h3>
        <p class="muted small" id="quizCourseHint"></p>
        <div class="seg" id="quizModeSeg">
          <button data-mode="module" class="active">模块测</button>
          <button data-mode="mix">综合练</button>
          <button data-mode="wrong">错题重练</button>
        </div>
        <div id="modulePick"></div>
        <button class="btn block" id="btnBeginQuiz" style="margin-top:10px">开始</button>
      </div>
    </div>
    <div id="quizPlay" class="hidden"></div>
    <div id="quizResult" class="hidden"></div>
  </section>

  <section class="page" id="page-review">
    <div class="card">
      <h3>错题本</h3>
      <p class="muted small">按当前课程日过滤。连续答对 2 次可移出。</p>
      <div id="wrongList"></div>
    </div>
  </section>

  <section class="page" id="page-me">
    <div class="card">
      <h3>学习数据（当前日）</h3>
      <div id="meStats" class="muted"></div>
    </div>
    <div class="card">
      <h3>模块掌握度</h3>
      <div id="meModules"></div>
    </div>
    <div class="card">
      <h3>全部课程总览</h3>
      <div id="meAllDays"></div>
    </div>
    <div class="card">
      <h3>设置</h3>
      <div class="row" style="margin-bottom:8px">
        <button class="btn soft" id="btnFontNormal">标准字</button>
        <button class="btn soft" id="btnFontLarge">大字号</button>
      </div>
      <button class="btn ghost block" id="btnCopyShare">复制分享链接</button>
      <button class="btn bad block" style="margin-top:8px" id="btnResetDay">重置当前日进度</button>
      <button class="btn ghost block" style="margin-top:8px" id="btnResetAll">重置全部进度</button>
    </div>
    <div class="card">
      <h3>关于</h3>
      <p class="muted small">支持每日新增课程。顶部切换 Day1 / Day2 … 查看对应教案与习题。进度保存在本机浏览器。</p>
      <p class="muted small" id="aboutVersion"></p>
    </div>
  </section>
</div>

<nav class="nav" id="bottomNav">
  <button data-tab="home" class="active"><span class="ico">🏠</span>首页</button>
  <button data-tab="learn"><span class="ico">📘</span>学</button>
  <button data-tab="quiz"><span class="ico">✍️</span>练</button>
  <button data-tab="review"><span class="ico">🔁</span>回看</button>
  <button data-tab="me"><span class="ico">👤</span>我的</button>
</nav>
<div class="sheet-mask" id="sheetMask"><div class="sheet" id="sheetBody"></div></div>
<div class="toast" id="toast"></div>
<script>

"}, {"key": "false", "text": "错误"}], "answer": "true", "explain": "读图+执行。", "wrongHint": "多模态", "review": {"cardIds": ["D1-C4"], "quoteIds": ["D1-Q2"], "anchorIds": ["D1-A2"]}, "difficulty": 2, "tags": []}]}, {"id": "day2", "date": "2026-07-16", "title": "Day 2 · 会做工具 · 会说需求", "subtitle": "Vibe Coding · Workflow · 计划模式 · 多轮验收", "duration": "约 1h43m", "minuteToken": "obcnuop1h178nwd26841e9nl", "summary": "从会聊走向会做：现场做压缩/水印工具，理解 Agent/Workflow/Vibe Coding，学会计划模式与大白话提需求。", "goals": ["会用多轮修正做小工具", "说清 Agent 与 Workflow", "理解 Prompt 三阶段与 Skills 升级", "会用计划模式与验收式对话"], "modules": [{"id": "D2-M1", "title": "小工具思维 / Vibe Coding", "order": 1, "timeRange": "00:00–09:00", "chapterRef": "开场案例", "summary": "日常小痛点可做成工具；描述需求→AI 写代码→得到产品，这个过程叫 Vibe Coding。", "goals": ["小问题工具化", "理解 Vibe Coding"], "color": "#3B82F6"}, {"id": "D2-M2", "title": "多轮修正与验收", "order": 2, "timeRange": "03:48–09:00", "chapterRef": "压缩工具迭代", "summary": "工具很少一次完美；遇到问题就说，让 AI 改：格式、画质、版本清理、自动压缩。", "goals": ["多轮对话修正", "自己验收"], "color": "#06B6D4"}, {"id": "D2-M3", "title": "Agent 智能体再理解", "order": 3, "timeRange": "22:44–28:30", "chapterRef": "计划执行现场", "summary": "Agent 不是一问一答：可拆多任务、互相对话协作，为达成目标自主推进。", "goals": ["Agent vs 聊天", "多智能体协作感"], "color": "#F59E0B"}, {"id": "D2-M4", "title": "Workflow 工作流", "order": 4, "timeRange": "28:23–33:30", "chapterRef": "SOP 类比", "summary": "Workflow=工作流程/SOP；可把多步 AI 串起来，一次输入得到最终输出。", "goals": ["Workflow=流程", "串工具省步骤"], "color": "#8B5CF6"}, {"id": "D2-M5", "title": "Prompt 三阶段与 Skills", "order": 5, "timeRange": "34:18–44:00", "chapterRef": "材料讲解", "summary": "提示词进化：一句话→上下文→Skills；Skills 可复用、可分享、可迭代，甚至是能力包。", "goals": ["三阶段", "Skills 新理解"], "color": "#22C55E"}, {"id": "D2-M6", "title": "计划模式 · 说话方式 · 交付", "order": 6, "timeRange": "20:25–01:42", "chapterRef": "知识宝典与水印", "summary": "复杂任务开计划模式先确认；大白话直说问题；网页/EXE/GitHub 是不同交付方式。", "goals": ["何时计划模式", "大白话提需求", "交付与分享"], "color": "#EF4444"}], "cards": [{"id": "D2-C1", "moduleId": "D2-M1", "type": "demo", "title": "图片压缩小工具案例", "body": "没有会员时，可用 Agent 现场做一个压缩工具：批量、输出到桌面、拖入自动压缩。", "classroomQuote": "我就用 WorkBuddy 自己现场做了一个压缩图片工具。", "rigorousNote": "适合小而明确的重复劳动；关键结果仍要自己看。", "tags": ["案例", "工具"], "anchorIds": ["D2-A1"]}, {"id": "D2-C2", "moduleId": "D2-M1", "type": "concept", "title": "Vibe Coding 是什么", "body": "不是 AI 写几行代码四个字，而是：人描述需求 → AI 生成代码 → 变成可用产品 的整段流程。", "classroomQuote": "用户描述一下需求……AI 生成代码……变成产品，这个过程叫 vibe coding。", "rigorousNote": "课堂现场做压缩/水印/知识宝典，都是 Vibe Coding 实践。", "tags": ["VibeCoding"], "anchorIds": ["D2-A1"]}, {"id": "D2-C3", "moduleId": "D2-M1", "type": "method", "title": "垂直应用 vs 自己做", "body": "伽马等 AI PPT 是垂直场景应用；有了 Agent 后，很多专用工具可按需自建。", "classroomQuote": "他们专门就是用 AI 大模型去开发专门场景应用……有了 agent 就不这么干了。", "rigorousNote": "不是绝对不用垂直工具，而是多了一条自己做的路。", "tags": ["选型"], "anchorIds": ["D2-A1"]}, {"id": "D2-C4", "moduleId": "D2-M2", "type": "method", "title": "遇到啥就说啥", "body": "第一次做完常有问题：别人打不开→做 EXE；路径找不到→教复制地址栏；PNG 变 JPG→改格式；画质糊→改算法；版本乱→清理。", "classroomQuote": "我遇到啥我就给他发啥……他是不是就按照我的去改了？", "rigorousNote": "多轮修正=验收式协作，不是一次提示写完美。", "tags": ["迭代"], "anchorIds": ["D2-A2"]}, {"id": "D2-C5", "moduleId": "D2-M2", "type": "boundary", "title": "自己要会用、会验", "body": "工具好不好用，自己最清楚；复杂东西需要一步步纠正。", "classroomQuote": "像这种复杂的东西，你需要一步步纠正吗？……多次对话进行修正。", "rigorousNote": "AI 加速实现，人负责标准与验收。", "tags": ["验收"], "anchorIds": ["D2-A2"]}, {"id": "D2-C6", "moduleId": "D2-M3", "type": "concept", "title": "Agent=智能体", "body": "Agent/智能体：不只是大模型一问一答，而是可多模型/多任务协作、按流程运转，为达成目标推进。", "classroomQuote": "智能体……不是你一问我一答……他们自己可能之间都会相互对话。", "rigorousNote": "WorkBuddy/Codex 可视为 Agent 平台。", "tags": ["Agent"], "anchorIds": ["D2-A3"]}, {"id": "D2-C7", "moduleId": "D2-M3", "type": "concept", "title": "Agent 平台 vs 豆包聊天", "body": "对豆包：你一句它一句。对 Agent 平台：你一句，它可能拆多个子任务自己跑（读文件、调研、写代码）。", "classroomQuote": "它基本上还没回你话呢，它在自己跟自己说话呢……分出了两个小人。", "rigorousNote": "任务越复杂，工作时间往往越长，这是正常的。", "tags": ["Agent"], "anchorIds": ["D2-A3"]}, {"id": "D2-C8", "moduleId": "D2-M4", "type": "concept", "title": "Workflow=工作流/SOP", "body": "Workflow 中文=工作流，大白话=工作流程，类似企业 SOP：先做什么后做什么。" const STORE_KEY = "ai-kb-v2";
const SHARE_URL = "https://zaizizaizi.github.io/ai-lesson-kb/";

function dayKey(){
  const d = new Date();
  return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
}
function defaultDayState(){
  return {
    learnedModuleIds: [],
    quizHistory: [],
    wrongIds: [],
    masterCount: {},
    masteredIds: [],
    lastModuleId: null,
    quoteIndex: 0,
    today: { date: dayKey(), learned: false, quizCount: 0, reviewed: false }
  };
}
function defaultState(){
  return {
    version: 2,
    currentCourseId: DATA.courses[DATA.courses.length-1].id,
    settings: { fontScale: 1 },
    days: {},
    lastOpen: new Date().toISOString()
  };
}
function loadState(){
  try{
    const raw = localStorage.getItem(STORE_KEY);
    if(!raw){
      // migrate v1 if present
      const v1 = localStorage.getItem("ai-kb-v1");
      const s = defaultState();
      if(v1){
        try{
          const old = JSON.parse(v1);
          const d = defaultDayState();
          d.learnedModuleIds = (old.learnedModuleIds||[]).map(function(id){
            // old M1 -> try D1-M1 if day1
            if(/^M\d$/.test(id)) return "D1-" + id;
            return id;
          });
          d.quizHistory = old.quizHistory || [];
          d.wrongIds = old.wrongIds || [];
          d.masterCount = old.masterCount || {};
          d.masteredIds = old.masteredIds || [];
          s.days.day1 = d;
          s.currentCourseId = "day1";
        }catch(e){}
      }
      return s;
    }
    const s = Object.assign(defaultState(), JSON.parse(raw));
    if(!s.days) s.days = {};
    return s;
  }catch(e){ return defaultState(); }
}
function saveState(){
  state.lastOpen = new Date().toISOString();
  localStorage.setItem(STORE_KEY, JSON.stringify(state));
}
let state = loadState();
if(state.settings && state.settings.fontScale === 1.15){
  document.documentElement.style.setProperty("--font","18px");
}

function courseById(id){ return DATA.courses.find(function(c){ return c.id===id; }); }
function currentCourse(){
  let c = courseById(state.currentCourseId);
  if(!c){ c = DATA.courses[DATA.courses.length-1]; state.currentCourseId = c.id; }
  return c;
}
function dayState(courseId){
  const id = courseId || state.currentCourseId;
  if(!state.days[id]) state.days[id] = defaultDayState();
  const d = state.days[id];
  if(!d.today || d.today.date !== dayKey()){
    d.today = { date: dayKey(), learned: false, quizCount: 0, reviewed: false };
  }
  return d;
}
function byId(arr,id){ return arr.find(function(x){ return x.id===id; }); }
function moduleOf(course, id){ return byId(course.modules, id); }
function cardsOf(course, mid){ return course.cards.filter(function(c){ return c.moduleId===mid; }); }
function qsOf(course, mid){ return course.questions.filter(function(q){ return q.moduleId===mid; }); }
function shuffle(a){
  const arr = a.slice();
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    const t=arr[i]; arr[i]=arr[j]; arr[j]=t;
  }
  return arr;
}
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(function(){ el.classList.remove("show"); }, 1800);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, function(m){
    return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m];
  });
}

function accuracy(ds){
  const h = ds.quizHistory || [];
  if(!h.length) return null;
  const ok = h.filter(function(x){ return x.correct; }).length;
  return Math.round(ok / h.length * 100);
}
function moduleMastery(course, ds, mid){
  const qs = qsOf(course, mid);
  if(!qs.length) return 0;
  const related = ds.quizHistory.filter(function(h){
    return qs.some(function(q){ return q.id===h.qid; });
  });
  if(!related.length) return ds.learnedModuleIds.indexOf(mid)>=0 ? 20 : 0;
  const last = {};
  related.forEach(function(h){ last[h.qid] = h.correct; });
  const ids = Object.keys(last);
  const ok = ids.filter(function(id){ return last[id]; }).length;
  const rate = ok / qs.length;
  const boost = ds.learnedModuleIds.indexOf(mid)>=0 ? 0.15 : 0;
  return Math.min(100, Math.round((rate + boost) * 100));
}
function courseOverall(course, ds){
  if(!course.modules.length) return 0;
  const sum = course.modules.reduce(function(s,m){ return s + moduleMastery(course, ds, m.id); }, 0);
  return Math.round(sum / course.modules.length);
}
function weakModules(course, ds){
  return course.modules.map(function(m){
    return {id:m.id, title:m.title, score: moduleMastery(course, ds, m.id)};
  }).sort(function(a,b){ return a.score-b.score; }).slice(0,2).filter(function(x){ return x.score<70; });
}

function fillCourseSelect(){
  const sel = document.getElementById("courseSelect");
  sel.innerHTML = DATA.courses.map(function(c){
    return '<option value="'+c.id+'">'+escapeHtml(c.date)+" · "+escapeHtml(c.title)+"</option>";
  }).join("");
  sel.value = state.currentCourseId;
  sel.onchange = function(){
    state.currentCourseId = sel.value;
    saveState();
    refreshAll();

}

function refreshHeader(){
  const course = currentCourse();
  const ds = dayState();
  const overall = courseOverall(course, ds);
  const acc = accuracy(ds);
  document.getElementById("topSub").textContent = course.subtitle + " · " + course.duration;
  document.getElementById("statLearned").textContent = ds.learnedModuleIds.length + "/" + course.modules.length;
  document.getElementById("statAcc").textContent = acc==null ? "-" : (acc+"%");
  document.getElementById("statWrong").textContent = String(ds.wrongIds.length);
  document.getElementById("homeRing").style.setProperty("--p", overall+"%");
  document.getElementById("homeRingText").textContent = overall+"%";
  document.getElementById("taskLearn").classList.toggle("done", !!ds.today.learned);
  document.getElementById("taskQuiz").classList.toggle("done", ds.today.quizCount>=8);
  document.getElementById("taskReview").classList.toggle("done", !!ds.today.reviewed);
  document.getElementById("taskQuizText").textContent = "已练 " + Math.min(ds.today.quizCount,8) + " / 8";
  document.getElementById("homeCourseTitle").textContent = course.title;
  document.getElementById("homeCourseSummary").textContent = course.summary;
  document.getElementById("homeGoals").innerHTML = (course.goals||[]).map(function(g){
    return '<span class="chip gray">'+escapeHtml(g)+'</span>';
  }).join("");
  document.getElementById("aboutVersion").textContent = "版本 " + DATA.meta.version + " · 共 " + DATA.courses.length + " 天课程";

  // all days progress
  document.getElementById("allDaysProgress").innerHTML = DATA.courses.map(function(c){
    const d = dayState(c.id);
    const p = courseOverall(c, d);
    const active = c.id===course.id ? " active-day" : "";
    return '<div class="card day-card'+active+'" data-cid="'+c.id+'" style="margin-bottom:8px;padding:12px">'
      +'<div style="display:flex;justify-content:space-between;gap:8px"><b>'+escapeHtml(c.title)+'</b>'
      +'<span class="chip '+(p>=70?'green':(p>0?'orange':'gray'))+'">'+p+'%</span></div>'
      +'<div class="muted small">'+escapeHtml(c.date)+' · 题量 '+c.questions.length+' · 错题 '+d.wrongIds.length+'</div>'
      +'<div class="bar"><i style="width:'+p+'%"></i></div></div>';
  }).join("");
  document.querySelectorAll("#allDaysProgress [data-cid]").forEach(function(el){
    el.onclick = function(){
      state.currentCourseId = el.getAttribute("data-cid");
      document.getElementById("courseSelect").value = state.currentCourseId;
      saveState();
      refreshAll();
      toast("已切换课程日");
    };
  });

  // quote
  const qs = course.quotes || [];
  if(qs.length){
    const q = qs[ds.quoteIndex % qs.length];
    document.getElementById("homeQuote").textContent = q.text;
  }else{
    document.getElementById("homeQuote").textContent = "先学再练，答错就回看。";
  }

  // weak
  const weak = weakModules(course, ds);
  const box = document.getElementById("weakBox");
  if(!ds.quizHistory.length){
    box.innerHTML = "先做几道题，我会帮你找出薄弱模块。";
  }else if(!weak.length){
    box.innerHTML = "<span class='chip green'>状态不错</span> 暂无明显薄弱模块，去综合练巩固吧。";
  }else{
    box.innerHTML = weak.map(function(w){
      return '<div style="margin:6px 0"><span class="chip orange">'+escapeHtml(w.title)+'</span> 掌握度约 '+w.score
        +'% <button class="btn soft" style="margin-left:6px;padding:6px 10px;min-height:36px" data-weak="'+w.id+'">去学</button></div>';
    }).join("");
    box.querySelectorAll("[data-weak]").forEach(function(btn){
      btn.onclick = function(){ openModule(btn.getAttribute("data-weak")); switchTab("learn"); };
    });
  }
}

function switchTab(name){
  document.querySelectorAll(".page").forEach(function(p){ p.classList.remove("active"); });
  document.getElementById("page-"+name).classList.add("active");
  document.querySelectorAll("#bottomNav button").forEach(function(b){
    b.classList.toggle("active", b.getAttribute("data-tab")===name);
  });
  if(name==="learn") renderLearnList();
  if(name==="quiz") renderQuizSetup();
  if(name==="review") renderWrongList();
  if(name==="me") renderMe();
  if(name==="home") refreshHeader();
  window.scrollTo({top:0, behavior:"smooth"});
}
document.querySelectorAll("#bottomNav button").forEach(function(btn){
  btn.addEventListener("click", function(){ switchTab(btn.getAttribute("data-tab")); });
});

  const m = moduleOf(course, mid);
  if(!m) return;
  const ds = dayState();
  ds.lastModuleId = mid;
  saveState();
  const list = document.getElementById("learnList");
  const detail = document.getElementById("learnDetail");
  list.classList.add("hidden");
  detail.classList.remove("hidden");
  const cards = cardsOf(course, mid);
  const quotes = course.quotes.filter(function(q){ return q.moduleId===mid; });
  detail.innerHTML = '<button class="back-btn" id="backLearn">← 返回模块列表</button>'
    +'<div class="card"><div class="kicker">'+escapeHtml(m.timeRange)+' · '+escapeHtml(m.chapterRef)+'</div>'
    +'<h2>'+escapeHtml(m.title)+'</h2><p>'+escapeHtml(m.summary)+'</p>'
    +'<div class="tag-row">'+(m.goals||[]).map(function(g){ return '<span class="chip gray">'+escapeHtml(g)+'</span>'; }).join("")+'</div>'
    +'<div class="row" style="margin-top:10px"><button class="btn" id="markLearned">标记已学</button>'
    +'<button class="btn soft" id="quizThis">本模块测验</button></div></div>'
    +'<div class="card"><h3>2 分钟速览</h3><ul style="margin:0;padding-left:18px" class="muted">'
    + cards.slice(0,5).map(function(c){
        return '<li style="margin:6px 0"><b style="color:var(--text)">'+escapeHtml(c.title)+'</b> — '+escapeHtml(c.body.slice(0,42))+'…</li>';
      }).join("")
    +'</ul></div>'
    + quotes.map(function(q){ return '<div class="quote">'+escapeHtml(q.text)+'</div>'; }).join("")
    + cards.map(renderCard).join("");
  document.getElementById("backLearn").onclick = renderLearnList;
  document.getElementById("markLearned").onclick = function(){
    if(ds.learnedModuleIds.indexOf(mid)<0){
      ds.learnedModuleIds.push(mid);
      ds.today.learned = true;
      saveState();
      toast("已标记为已学");
      refreshHeader();
      openModule(mid);
    }else toast("该模块已标记");
  };
  document.getElementById("quizThis").onclick = function(){
    quizMode = "module";
    quizModuleId = mid;
    startQuiz();
    switchTab("quiz");
  };
}

let quizMode = "module";
let quizModuleId = null;
let quizQueue = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizAnswered = false;

function renderQuizSetup(){
  const course = currentCourse();
  document.getElementById("quizSetup").classList.remove("hidden");
  document.getElementById("quizPlay").classList.add("hidden");
  document.getElementById("quizResult").classList.add("hidden");
  document.getElementById("quizCourseHint").textContent = "当前课程：" + course.title + "（" + course.questions.length + " 题）";
  if(!quizModuleId) quizModuleId = course.modules[0].id;
  const pick = document.getElementById("modulePick");
  pick.innerHTML = '<div class="muted small" style="margin-bottom:6px">模块测请选择：</div>'
    + course.modules.map(function(m){

          +'<input type="radio" name="mid" value="'+m.id+'"'+checked+'/> <span><b>'+escapeHtml(m.title)
          +'</b> <span class="muted small">('+qsOf(course,m.id).length+'题)</span></span></label>';
      }).join("");
  document.querySelectorAll("#quizModeSeg button").forEach(function(b){

    b.onclick = function(){
      quizMode = b.getAttribute("data-mode");
      document.querySelectorAll("#quizModeSeg button").forEach(function(x){
        x.classList.toggle("active", x.getAttribute("data-mode")===quizMode);
      });
      pick.style.display = quizMode==="module" ? "block" : "none";
    };

}

document.getElementById("btnBeginQuiz").onclick = function(){
  const checked = document.querySelector('input[name="mid"]:checked');
  if(checked) quizModuleId = checked.value;
  startQuiz();
};

function buildQueue(){
  const course = currentCourse();
  const ds = dayState();
  if(quizMode==="module") return shuffle(qsOf(course, quizModuleId));
  if(quizMode==="wrong"){
    const arr = ds.wrongIds.map(function(id){ return byId(course.questions, id); }).filter(Boolean);
    return shuffle(arr);
  }
  // mix: up to 12, at least 1 per module
  const picks = [];
  course.modules.forEach(function(m){
    const pool = shuffle(qsOf(course, m.id));
    if(pool[0]) picks.push(pool[0]);
  });
  const rest = shuffle(course.questions.filter(function(q){ return picks.indexOf(q)<0; }));
  while(picks.length<12 && rest.length) picks.push(rest.pop());
  return shuffle(picks).slice(0, Math.min(12, picks.length));
}

function startQuiz(){
  quizQueue = buildQueue();
  if(!quizQueue.length){
    toast(quizMode==="wrong" ? "暂无错题，先去练习吧" : "题库为空");
    renderQuizSetup();
    return;
  }
  quizIndex = 0; quizCorrect = 0; quizAnswered = false;
  document.getElementById("quizSetup").classList.add("hidden");
  document.getElementById("quizResult").classList.add("hidden");
  document.getElementById("quizPlay").classList.remove("hidden");
  renderQuestion();
}

function renderQuestion(){
  const course = currentCourse();
  const q = quizQueue[quizIndex];
  const play = document.getElementById("quizPlay");
  quizAnswered = false;
  const m = moduleOf(course, q.moduleId);
  play.innerHTML = '<div class="card"><div class="quiz-progress">第 '+(quizIndex+1)+' / '+quizQueue.length
    +' 题 · '+escapeHtml(m.title)+' · '+(q.type==="judge"?"判断题":"选择题")+'</div>'
    +'<h3 style="font-size:17px;line-height:1.45">'+escapeHtml(q.stem)+'</h3>'
    +'<div id="optBox" style="margin-top:12px">'
    + q.options.map(function(o){
        const label = (o.key==="true"||o.key==="false") ? o.text : (o.key+". "+o.text);
        return '<button class="option" data-key="'+o.key+'">'+escapeHtml(label)+'</button>';
      }).join("")
    +'</div><div id="quizFeedback" class="hidden" style="margin-top:8px"></div>'
    +'<button class="btn block hidden" id="btnNextQ" style="margin-top:10px">下一题</button></div>';
  play.querySelectorAll(".option").forEach(function(btn){
    btn.onclick = function(){ answerQuestion(btn.getAttribute("data-key"), btn); };
  });
}

function answerQuestion(key, btnEl){
  if(quizAnswered) return;
  quizAnswered = true;
  const course = currentCourse();
  const ds = dayState();
  const q = quizQueue[quizIndex];
  const correct = String(q.answer) === String(key);
  document.querySelectorAll("#optBox .option").forEach(function(o){
    o.disabled = true;
    if(String(o.getAttribute("data-key"))===String(q.answer)) o.classList.add("correct");
    if(o===btnEl && !correct) o.classList.add("wrong");
    if(o===btnEl) o.classList.add("selected");
  });
  ds.quizHistory.push({qid:q.id, correct:correct, ts:Date.now()});
  ds.today.quizCount += 1;
  if(correct){
    quizCorrect += 1;
    if(ds.wrongIds.indexOf(q.id)>=0){
      ds.masterCount[q.id] = (ds.masterCount[q.id]||0) + 1;
      if(ds.masterCount[q.id] >= 2){
        ds.wrongIds = ds.wrongIds.filter(function(id){ return id!==q.id; });
        if(ds.masteredIds.indexOf(q.id)<0) ds.masteredIds.push(q.id);
        delete ds.masterCount[q.id];
        toast("连续答对，已移出错题本");
      }
    }
  }else{
    if(ds.wrongIds.indexOf(q.id)<0) ds.wrongIds.push(q.id);
    ds.masterCount[q.id] = 0;
  }
  saveState();
  refreshHeader();

  const fb = document.getElementById("quizFeedback");
  fb.classList.remove("hidden");
  if(correct){
    fb.innerHTML = '<div class="chip green">回答正确</div><p class="muted" style="margin:8px 0 0">'+escapeHtml(q.explain)+'</p>';
    document.getElementById("btnNextQ").classList.remove("hidden");
  }else{
    fb.innerHTML = '<div class="chip orange">回答错误</div><p style="margin:8px 0">'+escapeHtml(q.wrongHint||"")+'</p>'
      +'<button class="btn block" id="btnOpenReview">查看课堂相关 · 温习昨日内容</button>'
      +'<button class="btn ghost block" id="btnSkipReview" style="margin-top:8px">先看解析继续</button>';
    document.getElementById("btnOpenReview").onclick = function(){ openReviewSheet(q, true); };
    document.getElementById("btnSkipReview").onclick = function(){ openReviewSheet(q, false); };
  }
  document.getElementById("btnNextQ").onclick = nextQuestion;
}

function nextQuestion(){
  closeSheet();
  if(quizIndex >= quizQueue.length-1) showQuizResult();
  else { quizIndex += 1; renderQuestion(); }
}

function showQuizResult(){
  document.getElementById("quizPlay").classList.add("hidden");
  const res = document.getElementById("quizResult");
  res.classList.remove("hidden");
  const total = quizQueue.length;
  const rate = Math.round(quizCorrect/total*100);
  res.innerHTML = '<div class="card"><div class="kicker">本轮结束</div><div class="result-big">'+quizCorrect+'/'+total+'</div>'
    +'<p style="text-align:center">正确率 '+rate+'%</p>'
    +'<p class="muted" style="text-align:center">'+(rate>=80?"很棒，继续保持！":(rate>=60?"还可以，建议回看错题。":"先去学模块，再回来练。"))+'</p>'
    +'<button class="btn block" id="btnAgain">再来一轮</button>'
    +'<button class="btn ghost block" style="margin-top:8px" id="btnToWrong">去错题本</button>'
    +'<button class="btn soft block" style="margin-top:8px" id="btnToLearn2">去学习</button></div>';
  document.getElementById("btnAgain").onclick = function(){ renderQuizSetup(); };
  document.getElementById("btnToWrong").onclick = function(){ switchTab("review"); };
  document.getElementById("btnToLearn2").onclick = function(){ switchTab("learn"); };
}

function openReviewSheet(q, full){
  const course = currentCourse();
  const ds = dayState();
  ds.today.reviewed = true;
  saveState();
  refreshHeader();
  const cards = (q.review && q.review.cardIds || []).map(function(id){ return byId(course.cards,id); }).filter(Boolean);
  const quotes = (q.review && q.review.quoteIds || []).map(function(id){ return byId(course.quotes,id); }).filter(Boolean);
  const anchors = (q.review && q.review.anchorIds || []).map(function(id){ return byId(course.anchors,id); }).filter(Boolean);
  const m = moduleOf(course, q.moduleId);
  const body = document.getElementById("sheetBody");
  body.innerHTML = '<div class="handle"></div><div class="kicker">答错回看 · '+escapeHtml(m.title)+'</div>'
    +'<h3 style="margin:0 0 8px">本题解析</h3><p>'+escapeHtml(q.explain)+'</p>'
    + quotes.map(function(qt){ return '<div class="quote">'+escapeHtml(qt.text)+'</div>'; }).join("")
    + cards.map(function(c){
        return '<div class="card" style="box-shadow:none;margin:10px 0"><h3 style="font-size:15px">'+escapeHtml(c.title)+'</h3>'
          +'<p class="small">'+escapeHtml(c.body)+'</p>'
          +'<details class="fold"><summary>课堂原话 vs 更严谨</summary><div class="body">'
          +'<p><b>原话：</b>'+escapeHtml(c.classroomQuote||"")+'</p>'
          +'<p><b>严谨：</b>'+escapeHtml(c.rigorousNote||"")+'</p></div></details></div>';
      }).join("")
    + anchors.map(function(a){
        return '<div class="anchor-box"><div><b>课堂定位</b> '+escapeHtml(a.timeCode)+' · '+escapeHtml(a.chapter)+'</div>'
          +'<div style="margin-top:4px">'+escapeHtml(a.label)+'</div>'
          +'<div class="muted" style="margin-top:6px">「'+escapeHtml(a.transcriptHint)+'」</div></div>';
      }).join("")
    +'<div class="row" style="margin-top:14px"><button class="btn" id="sheetNext">继续答题</button>'
    +'<button class="btn soft" id="sheetLearn">去学该模块</button></div>';
  document.getElementById("sheetMask").classList.add("show");
  document.getElementById("sheetNext").onclick = function(){
    closeSheet();
    const n = document.getElementById("btnNextQ");
    if(n) n.classList.remove("hidden");
    nextQuestion();
  };
  document.getElementById("sheetLearn").onclick = function(){
    closeSheet();
    openModule(q.moduleId);
    switchTab("learn");
  };
  if(!full){
    const n = document.getElementById("btnNextQ");
    if(n) n.classList.remove("hidden");
  }
}
function closeSheet(){ document.getElementById("sheetMask").classList.remove("show"); }
document.getElementById("sheetMask").addEventListener("click", function(e){
  if(e.target.id==="sheetMask") closeSheet();
});

function renderWrongList(){
  const course = currentCourse();
  const ds = dayState();
  const box = document.getElementById("wrongList");
  const ids = ds.wrongIds.filter(function(id){ return ds.masteredIds.indexOf(id)<0; });
  if(!ids.length){
    box.innerHTML = '<div class="empty">暂无错题<br/><span class="small">答错后会自动收集，并可回看课堂片段</span></div>';
    return;
  }
  box.innerHTML = ids.map(function(id){
    const q = byId(course.questions, id);
    if(!q) return "";
    const m = moduleOf(course, q.moduleId);
    const mc = ds.masterCount[id]||0;
    return '<div class="list-item"><div class="chip gray">'+escapeHtml(m.title)+'</div>'
      +'<div style="margin-top:6px;font-weight:600">'+escapeHtml(q.stem)+'</div>'
      +'<div class="muted small" style="margin-top:4px">连续答对进度 '+mc+'/2 · '+(q.type==="judge"?"判断":"选择")+'</div>'
      +'<div class="row" style="margin-top:8px">'
      +'<button class="btn soft" data-review="'+q.id+'">回看课堂</button>'
      +'<button class="btn" data-retry="'+q.id+'">再练此题</button>'
      +'<button class="btn ghost" data-master="'+q.id+'">标记掌握</button></div></div>';
  }).join("");
  box.querySelectorAll("[data-review]").forEach(function(b){
    b.onclick = function(){
      const q = byId(course.questions, b.getAttribute("data-review"));
      openReviewSheet(q, true);
      setTimeout(function(){
        const n = document.getElementById("sheetNext");
        if(n){ n.textContent = "关闭"; n.onclick = closeSheet; }
      },0);
    };
  });
  box.querySelectorAll("[data-retry]").forEach(function(b){
    b.onclick = function(){
      const q = byId(course.questions, b.getAttribute("data-retry"));
      quizMode = "wrong";
      quizQueue = [q];
      quizIndex = 0; quizCorrect = 0; quizAnswered = false;
      document.getElementById("quizSetup").classList.add("hidden");
      document.getElementById("quizResult").classList.add("hidden");
      document.getElementById("quizPlay").classList.remove("hidden");
      switchTab("quiz");
      renderQuestion();
    };
  });
  box.querySelectorAll("[data-master]").forEach(function(b){
    b.onclick = function(){
      const id = b.getAttribute("data-master");
      const ds2 = dayState();
      ds2.wrongIds = ds2.wrongIds.filter(function(x){ return x!==id; });
      if(ds2.masteredIds.indexOf(id)<0) ds2.masteredIds.push(id);
      delete ds2.masterCount[id];
      saveState();
      toast("已标记掌握");
      renderWrongList();
      refreshHeader();
    };
  });
}

function renderMe(){
  const course = currentCourse();
  const ds = dayState();
  const acc = accuracy(ds);
  document.getElementById("meStats").innerHTML =
    "<p>当前课程：<b>"+escapeHtml(course.title)+"</b></p>"
    +"<p>累计作答：<b>"+ds.quizHistory.length+"</b> 次</p>"
    +"<p>正确率：<b>"+(acc==null?"-":acc+"%")+"</b></p>"
    +"<p>已学模块：<b>"+ds.learnedModuleIds.length+"/"+course.modules.length+"</b></p>"
    +"<p>错题：<b>"+ds.wrongIds.length+"</b> · 已掌握移出：<b>"+ds.masteredIds.length+"</b></p>";
  document.getElementById("meModules").innerHTML = course.modules.map(function(m){
    const s = moduleMastery(course, ds, m.id);
    return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between"><b>'
      +escapeHtml(m.title)+'</b><span class="muted small">'+s+'%</span></div>'
      +'<div class="bar"><i style="width:'+s+'%;background:'+m.color+'"></i></div></div>';
  }).join("");
  document.getElementById("meAllDays").innerHTML = DATA.courses.map(function(c){
    const d = dayState(c.id);
    const p = courseOverall(c, d);
    return '<div class="list-item"><b>'+escapeHtml(c.title)+'</b> <span class="chip blue">'+p+'%</span>'
      +'<div class="muted small">'+escapeHtml(c.date)+' · 练 '+d.quizHistory.length+' · 错 '+d.wrongIds.length+'</div></div>';
  }).join("");
}

function refreshAll(){
  fillCourseSelect();
  refreshHeader();
  const active = document.querySelector(".page.active");
  if(active && active.id==="page-learn") renderLearnList();
  if(active && active.id==="page-quiz") renderQuizSetup();
  if(active && active.id==="page-review") renderWrongList();
  if(active && active.id==="page-me") renderMe();
}

document.getElementById("btnContinueLearn").onclick = function(){
  const course = currentCourse();
  const ds = dayState();
  const next = course.modules.find(function(m){ return ds.learnedModuleIds.indexOf(m.id)<0; })
    || moduleOf(course, ds.lastModuleId) || course.modules[0];
  openModule(next.id);
  switchTab("learn");
};
document.getElementById("btnStartQuiz").onclick = function(){
  quizMode = "mix";
  switchTab("quiz");
  document.querySelectorAll("#quizModeSeg button").forEach(function(b){
    b.classList.toggle("active", b.getAttribute("data-mode")==="mix");
  });
  document.getElementById("modulePick").style.display = "none";
};
document.getElementById("btnOpenWrong").onclick = function(){ switchTab("review"); };
document.getElementById("btnNextQuote").onclick = function(){
  const course = currentCourse();
  const ds = dayState();
  ds.quoteIndex = (ds.quoteIndex+1) % Math.max(1, course.quotes.length);
  saveState();
  refreshHeader();
};
document.getElementById("btnFontNormal").onclick = function(){
  state.settings.fontScale = 1;
  document.documentElement.style.setProperty("--font","16px");
  saveState(); toast("已切换标准字号");
};
document.getElementById("btnFontLarge").onclick = function(){
  state.settings.fontScale = 1.15;
  document.documentElement.style.setProperty("--font","18px");
  saveState(); toast("已切换大字号");
};
document.getElementById("btnResetDay").onclick = function(){
  if(confirm("确定重置当前课程日的学习进度？")){
    state.days[state.currentCourseId] = defaultDayState();
    saveState();
    refreshAll();
    toast("当前日进度已重置");
    switchTab("home");
  }
};
document.getElementById("btnResetAll").onclick = function(){
  if(confirm("确定重置全部课程进度？此操作不可恢复。")){
    state = defaultState();
    saveState();
    refreshAll();
    toast("全部进度已重置");
    switchTab("home");
  }
};
document.getElementById("btnCopyShare").onclick = async function(){
  const text = "【AI 主课知识宝典】每日课堂复习工具（教案+选择/判断，答错回看课堂片段）：\n" + SHARE_URL;
  try{
    await navigator.clipboard.writeText(text);
    toast("分享文案已复制");
  }catch(e){
    prompt("复制以下文案：", text);
  }
};

// init
refreshAll();
console.info("[AI-KB v2]", DATA.courses.length, "courses;",
  DATA.courses.reduce(function(s,c){ return s+c.questions.length; },0), "questions");

</script>
</body>
